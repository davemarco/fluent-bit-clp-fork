name: "binaries"

on:
  workflow_call:
    inputs:
      release_tag:
        description: "Release tag to upload assets to"
        type: "string"
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - arch: "amd64"
            runner: "ubuntu-24.04"
            manylinux: "quay.io/pypa/manylinux_2_28_x86_64"
            go_sha256: "dea9ca38a0b852a74e81c26134671af7c0fbe65d81b0dc1c5bfe22cf7d4c8858"
    runs-on: "${{ matrix.runner }}"
    permissions:
      contents: "write"
    steps:
      - uses: "actions/checkout@v6"
        with:
          persist-credentials: false

      - name: "Build binary"
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/src" \
            -w /src \
            ${{ matrix.manylinux }} \
            bash -c '
              set -e

              # Install Go (verify tarball checksum before extracting)
              GO_TARBALL="go1.24.0.linux-${{ matrix.arch }}.tar.gz"
              GO_SHA256="${{ matrix.go_sha256 }}"
              curl -fsSL -o "$GO_TARBALL" "https://go.dev/dl/$GO_TARBALL"
              echo "$GO_SHA256  $GO_TARBALL" | sha256sum -c -
              tar -C /usr/local -xzf "$GO_TARBALL"
              rm -f "$GO_TARBALL"
              export PATH="/usr/local/go/bin:$PATH"

              # Install Task
              curl -fsSL https://taskfile.dev/install.sh | sh -s -- -d -b /usr/local/bin

              # Build plugin
              export GOFLAGS="-buildvcs=false"
              cd plugins/out_clp_s3
              task build
            '

      - name: "Create release archive"
        working-directory: "plugins/out_clp_s3"
        run: tar -czvf out_clp_s3-linux-${{ matrix.arch }}.tar.gz out_clp_s3.so

      - name: "Upload to release"
        if: "${{ inputs.release_tag != '' }}"
        working-directory: "plugins/out_clp_s3"
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        run: gh release upload "${{ inputs.release_tag }}" out_clp_s3-linux-${{ matrix.arch }}.tar.gz --repo "${{ github.repository }}" --clobber
