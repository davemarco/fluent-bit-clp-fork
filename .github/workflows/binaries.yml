name: "binaries"

on:
  workflow_call:
    inputs:
      release_tag:
        description: "Release tag to upload assets to"
        type: "string"
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - arch: "amd64"
            runner: "ubuntu-24.04"
            manylinux: "quay.io/pypa/manylinux_2_28_x86_64"
          - arch: "arm64"
            runner: "ubuntu-24.04-arm"
            manylinux: "quay.io/pypa/manylinux_2_28_aarch64"
    runs-on: "${{ matrix.runner }}"
    permissions:
      contents: "write"
    steps:
      - uses: "actions/checkout@v6"

      - name: "Build binary"
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/src" \
            -w /src \
            ${{ matrix.manylinux }} \
            bash -c '
              set -e

              # Install Go
              curl -fsSL "https://go.dev/dl/go1.24.linux-${{ matrix.arch }}.tar.gz" | tar -C /usr/local -xz
              export PATH="/usr/local/go/bin:$PATH"

              # Install Task
              curl -fsSL https://taskfile.dev/install.sh | sh -s -- -d -b /usr/local/bin

              # Build plugin
              cd plugins/out_clp_s3
              task build
            '

      - name: "Create release archive"
        working-directory: "plugins/out_clp_s3"
        run: tar -czvf out_clp_s3-linux-${{ matrix.arch }}.tar.gz out_clp_s3.so out_clp_s3.h

      - name: "Upload to release"
        if: "${{ inputs.release_tag != '' }}"
        working-directory: "plugins/out_clp_s3"
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        run: gh release upload "${{ inputs.release_tag }}" out_clp_s3-linux-${{ matrix.arch }}.tar.gz --repo "${{ github.repository }}"
