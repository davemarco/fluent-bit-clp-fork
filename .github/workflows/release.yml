name: "release"

on:
  release:
    types: ["published"]

jobs:
  binaries:
    uses: "./.github/workflows/binaries.yml"
    with:
      release_tag: "${{ github.event.release.tag_name }}"
    permissions:
      contents: "write"

  image:
    uses: "./.github/workflows/image.yml"
    with:
      push: true
    permissions:
      contents: "read"
      packages: "write"
